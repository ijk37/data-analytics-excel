  - Notes:
      - Overview: 01-notes/README.md
      - "01 · Introduction to Excel": 01-notes/01-introduction-to-excel.md
      - "02 · Entering & Organizing Data": 01-notes/02-entering-and-organizing-data.md
      - "03 · Formulas & Cell References": 01-notes/03-formulas-and-cell-references.md
      - "04 · Essential Functions": 01-notes/04-essential-functions.md
      - "05 · Logical Functions": 01-notes/05-logical-functions.md
      - "06 · Text Functions": 01-notes/06-text-functions.md
      - "07 · Date & Time Functions": 01-notes/07-date-and-time-functions.md
      - "08 · Lookup & Reference Functions": 01-notes/08-lookup-and-reference-functions.md
      - "09 · Data Cleaning & Validation": 01-notes/09-data-cleaning-and-validation.md
      - "10 · Sorting, Filtering & Conditional Formatting": 01-notes/10-sorting-filtering-conditional-formatting.md
      - "11 · PivotTables & PivotCharts": 01-notes/11-pivottables-and-pivotcharts.md
      - "12 · Charts, Dashboards & What-If": 01-notes/12-charts-dashboards-what-if.md
  - Exercises:
      - Overview: 02-exercises/README.md
      - "Exercise 01 · Introduction": 02-exercises/01-introduction-to-excel-exe.md
      - "Exercise 02 · Entering & Organizing Data": 02-exercises/02-entering-and-organizing-data-exe.md
      - "Exercise 03 · Formulas & Cell References": 02-exercises/03-formulas-and-cell-references-exe.md
      - "Exercise 04 · Essential Functions": 02-exercises/04-essential-functions-exe.md
      - "Exercise 05 · Logical Functions": 02-exercises/05-logical-functions-exe.md
      - "Exercise 06 · Text Functions": 02-exercises/06-text-functions-exe.md
      - "Exercise 07 · Date & Time Functions": 02-exercises/07-date-and-time-functions-exe.md
      - "Exercise 08 · Lookup & Reference Functions": 02-exercises/08-lookup-and-reference-functions-exe.md
      - "Exercise 09 · Data Cleaning & Validation": 02-exercises/09-data-cleaning-and-validation-exe.md
      - "Exercise 10 · Sorting, Filtering & Conditional Formatting": 02-exercises/10-sorting-filtering-conditional-formatting-exe.md
      - "Exercise 11 · PivotTables & PivotCharts": 02-exercises/11-pivottables-and-pivotcharts-exe.md
