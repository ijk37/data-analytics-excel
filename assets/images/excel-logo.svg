<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Data Analytics with Excel</title>
  <rect width="64" height="64" rx="12" fill="#217346"/>
  <!-- spreadsheet grid -->
  <g fill="#ffffff">
    <rect x="14" y="16" width="16" height="10" rx="2"/>
    <rect x="34" y="16" width="16" height="10" rx="2"/>
    <rect x="14" y="30" width="16" height="10" rx="2"/>
    <rect x="34" y="30" width="16" height="10" rx="2"/>
  </g>
  <!-- rising bars (analytics) -->
  <g fill="#33C481">
    <rect x="16" y="48" width="6" height="6" rx="1"/>
    <rect x="26" y="45" width="6" height="9" rx="1"/>
    <rect x="36" y="42" width="6" height="12" rx="1"/>
    <rect x="46" y="46" width="6" height="8" rx="1"/>
  </g>
</svg>
